<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake — Arcade Zone</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    body { background: #0d0d14; }
    #game-canvas {
      background: #050510;
      border: 1px solid rgba(34,197,94,0.2);
      box-shadow: 0 0 40px rgba(34,197,94,0.08), 0 20px 60px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
<div class="game-page">

  <div class="game-nav-bar">
    <a href="../../index.html"><i data-lucide="arrow-left" class="icon-sm"></i> Back</a>
    <div class="game-title" style="color:var(--c-snake)">SNAKE</div>
    <div style="width:60px"></div>
  </div>

  <div class="game-hud" style="max-width:400px">
    <div class="hud-item">
      <span class="hud-label">Score</span>
      <span class="hud-val" id="score">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Level</span>
      <span class="hud-val" id="level">1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Best</span>
      <span class="hud-val" id="hi-score">—</span>
    </div>
  </div>

  <div class="canvas-wrapper">
    <canvas id="game-canvas" width="400" height="400"></canvas>
    <div class="start-overlay" id="start-overlay">
      <h2 style="color:var(--c-snake)">SNAKE</h2>
      <p>Eat the food — don't hit the walls!</p>
      <p style="font-size:12px;color:var(--text-muted)">Use arrow keys or WASD to move</p>
      <button class="btn btn-game" style="--card-color:var(--c-snake);width:160px" id="start-btn">▶ Play</button>
    </div>
  </div>

  <div class="mobile-dpad">
    <button class="dpad-btn dpad-up"    id="dpad-up">▲</button>
    <button class="dpad-btn dpad-left"  id="dpad-left">◄</button>
    <button class="dpad-btn dpad-down"  id="dpad-down">▼</button>
    <button class="dpad-btn dpad-right" id="dpad-right">►</button>
  </div>

  <div class="controls-hint" style="margin-top:12px">
    <kbd>↑ ↓ ← →</kbd> or <kbd>W A S D</kbd> to move &nbsp;·&nbsp; <kbd>P</kbd> to pause
  </div>
</div>

<!-- Game Over Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Game Over</div>
    <div class="modal-subtitle">Your score</div>
    <div class="modal-score" id="final-score">0</div>
    <input class="modal-input" id="player-name" type="text" maxlength="12"
      placeholder="Your name" autocomplete="off" spellcheck="false" />
    <div class="modal-actions">
      <button class="btn btn-primary" id="submit-btn">Submit Score</button>
      <button class="btn btn-secondary" id="replay-btn">Play Again</button>
      <a class="btn btn-secondary" href="../../index.html">Home</a>
    </div>
  </div>
</div>

<script type="module">
  import { submitScore, getHiScore, getSavedPlayerName, savePlayerName } from '../../js/leaderboard.js';

  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  const CELL = 20;
  const COLS = 20;
  const ROWS = 20;

  let snake, dir, nextDir, food, score, level, speed, loop, paused, alive;

  function init() {
    snake = [{x:10, y:10}, {x:9,y:10}, {x:8,y:10}];
    dir = {x:1, y:0};
    nextDir = {x:1, y:0};
    food = spawnFood();
    score = 0;
    level = 1;
    speed = 150;
    paused = false;
    alive = true;
    updateHUD();
  }

  function spawnFood() {
    let pos;
    do {
      pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
    } while (snake.some(s => s.x===pos.x && s.y===pos.y));
    return pos;
  }

  function gameStep() {
    if (!alive || paused) return;
    dir = nextDir;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { return gameOver(); }
    // Self collision
    if (snake.some(s => s.x===head.x && s.y===head.y)) { return gameOver(); }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10 * level;
      food = spawnFood();
      if (score % 100 === 0 && level < 10) {
        level++;
        speed = Math.max(80, speed - 8);
        resetLoop();
      }
    } else {
      snake.pop();
    }
    updateHUD();
    draw();
  }

  function resetLoop() {
    clearInterval(loop);
    loop = setInterval(gameStep, speed);
  }

  function draw() {
    // Background grid
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = '#0d0d30';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke();
    }

    // Food (pulsing)
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);
    ctx.fillStyle = `rgba(255,0,85,${pulse})`;
    ctx.shadowBlur = 10; ctx.shadowColor = '#ff0055';
    ctx.fillRect(food.x*CELL+2, food.y*CELL+2, CELL-4, CELL-4);
    ctx.shadowBlur = 0;

    // Snake
    snake.forEach((seg, i) => {
      const isHead = i === 0;
      if (isHead) {
        ctx.fillStyle = '#00ff88';
        ctx.shadowBlur = 12; ctx.shadowColor = '#00ff88';
      } else {
        const g = Math.floor(200 - (i / snake.length) * 140);
        ctx.fillStyle = `rgb(0,${g},50)`;
        ctx.shadowBlur = 0;
      }
      ctx.fillRect(seg.x*CELL+1, seg.y*CELL+1, CELL-2, CELL-2);
    });
    ctx.shadowBlur = 0;
  }

  function updateHUD() {
    document.getElementById('score').textContent = score.toLocaleString();
    document.getElementById('level').textContent = level;
  }

  async function loadHiScore() {
    try {
      const hi = await getHiScore('snake');
      if (hi) document.getElementById('hi-score').textContent = hi.score.toLocaleString();
    } catch(_) {}
  }

  function gameOver() {
    alive = false;
    clearInterval(loop);
    // Draw death flash
    ctx.fillStyle = 'rgba(255,0,0,0.3)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    setTimeout(showModal, 400);
  }

  function showModal() {
    document.getElementById('modal-title').textContent = 'Game Over';
    document.getElementById('final-score').textContent = score.toLocaleString();
    const saved = getSavedPlayerName();
    document.getElementById('player-name').value = saved;
    const btn = document.getElementById('submit-btn');
    btn.disabled = false; btn.textContent = 'Submit Score';
    document.getElementById('modal').classList.add('show');
    document.getElementById('player-name').focus();
  }

  function hideModal() {
    document.getElementById('modal').classList.remove('show');
  }

  // --- Controls ---
  const DIRS = {
    ArrowUp:{x:0,y:-1}, w:{x:0,y:-1},
    ArrowDown:{x:0,y:1}, s:{x:0,y:1},
    ArrowLeft:{x:-1,y:0}, a:{x:-1,y:0},
    ArrowRight:{x:1,y:0}, d:{x:1,y:0},
  };

  document.addEventListener('keydown', e => {
    if (document.activeElement.tagName === 'INPUT') return;
    if (e.key === 'p' || e.key === 'P') {
      paused = !paused;
      return;
    }
    const d = DIRS[e.key];
    if (d) {
      e.preventDefault();
      // Prevent reversing
      if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    }
  });

  // D-pad buttons
  ['up','down','left','right'].forEach(dir => {
    const map = {up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
    document.getElementById(`dpad-${dir}`)?.addEventListener('pointerdown', () => {
      const d = map[dir];
      if (d.x !== -nextDir.x || d.y !== -nextDir.y) nextDir = d;
    });
  });

  // Start
  document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('start-overlay').style.display = 'none';
    init();
    draw();
    resetLoop();
  });

  // Submit score
  document.getElementById('submit-btn').addEventListener('click', async function() {
    this.disabled = true;
    this.textContent = 'Submitting…';
    const name = document.getElementById('player-name').value.trim() || 'ANON';
    savePlayerName(name);
    try {
      await submitScore('snake', name, score);
      this.textContent = 'Submitted!';
    } catch(_) { this.disabled = false; this.textContent = 'Retry Submit'; }
  });

  document.getElementById('replay-btn').addEventListener('click', () => {
    hideModal();
    startFresh();
  });

  function startFresh() {
    init();
    draw();
    resetLoop();
  }

  loadHiScore();
  draw(); // initial blank draw
</script>
<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
